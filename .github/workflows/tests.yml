name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-14
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e .
      - run: python -m pip show startrail-pipeline
      - run: python -m unittest discover -s tests -v
      - run: python -m compileall -q startrail_pipeline tests
      - run: sh -n process_photo_batch.sh run_photo_test.sh
